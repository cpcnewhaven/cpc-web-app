{% extends 'admin/model/edit_bento.html' %}

{% block tail %}
{{ super() }}
<script>
(function() {
    // Live image preview for the URL field in the gallery edit form
    function initPreview() {
        const urlInput = document.querySelector('input[name="url"]');
        if (!urlInput) return;

        // Build preview container
        const wrap = urlInput.closest('.flex') || urlInput.parentElement;
        const preview = document.createElement('div');
        preview.id = 'url-preview';
        preview.style.cssText = 'margin-top:10px;border-radius:10px;overflow:hidden;border:1px solid var(--admin-border);background:var(--admin-panel);display:none;text-align:center;';

        const img = document.createElement('img');
        img.style.cssText = 'max-width:100%;max-height:280px;object-fit:contain;display:block;margin:auto;border-radius:8px;';
        img.onerror = function() { preview.style.display = 'none'; };
        img.onload = function() { preview.style.display = 'block'; };

        const label = document.createElement('p');
        label.style.cssText = 'font-size:0.75rem;color:var(--admin-text-muted);margin:6px 0 8px;';
        label.textContent = 'Image preview';

        preview.appendChild(img);
        preview.appendChild(label);
        wrap.parentElement.insertBefore(preview, wrap.nextSibling);

        function update() {
            const val = urlInput.value.trim();
            if (val && /\.(jpg|jpeg|png|gif|webp|avif|svg)(\?|$)/i.test(val) || val.includes('googleapis.com') || val.includes('imgix.net') || val.includes('scdn.co') || val.includes('cpcnewhaven.org')) {
                img.src = val;
            } else if (val) {
                img.src = val;  // try anyway
            } else {
                preview.style.display = 'none';
            }
        }

        urlInput.addEventListener('input', update);
        urlInput.addEventListener('change', update);
        // Show existing value on load
        if (urlInput.value) update();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPreview);
    } else {
        initPreview();
    }
})();
</script>
{% endblock %}
