{% extends 'admin/model/edit.html' %}

{% block header_text %}
<h3>Edit Teaching Series</h3>
<div
    style="background: rgba(0, 122, 255, 0.1); border-left: 4px solid var(--cpc-blue); padding: 1rem; margin-top: 1rem; border-radius: 4px; color: var(--text-white);">
    <i class="fas fa-info-circle" style="color: var(--cpc-blue); margin-right: 0.5rem;"></i>
    <strong>Manage Classes:</strong>
    You can add, edit, or delete classes (sessions) directly from this page using the <strong>Teaching Series
        Sessions</strong> section below.
</div>
{% endblock %}

{% block tail %}
{{ super() }}
<style>
    /* Wizard section card */
    #sessions-wizard {
        background: rgba(0, 122, 255, 0.12);
        backdrop-filter: blur(8px);
        border: 2px solid rgba(0, 122, 255, 0.4);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 2rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    #sessions-wizard h4 {
        margin-top: 0;
        color: #fff;
        font-size: 1.25rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    #sessions-wizard p {
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.95rem;
        line-height: 1.5;
        margin-bottom: 1.25rem;
    }

    /* Translucent inputs for the wizard */
    #wizard-session-count {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: white !important;
        backdrop-filter: blur(4px);
    }

    /* Reordered form adjustment */
    .admin-form-compact {
        display: flex;
        flex-direction: column;
    }

    #sessions-top-container {
        order: -1;
    }

    .fa-inline-add-hidden {
        display: none !important;
    }

    /* Force hide for templates that are leaking */
    .hide,
    .hidden,
    [style*="display:none"] {
        display: none !important;
    }
</style>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Look for the "Add" button that flask-admin creates for Inline Models.
        const addBtn = document.querySelector('#sessions-button') || document.querySelector('.inline-add-field');
        if (!addBtn) return;
        addBtn.classList.add('fa-inline-add-hidden');
        const inlineContainer = addBtn.closest('.form-group') || addBtn.parentElement;

        // Create the wizard container
        const topContainer = document.createElement('div');
        topContainer.id = 'sessions-top-container';

        // Create the wizard UI
        const wizardMarkup = `
        <div id="sessions-wizard">
            <h4><i class="fas fa-magic"></i> Step 1: Manage Your Classes</h4>
            <p>
                Adding more classes to this series? Enter how many new sessions you need. 
                Each session can have its own title, description, and PDF upload.
            </p>
            <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                <div class="input-group" style="max-width:280px; margin-bottom:0;">
                    <span class="input-group-addon" style="background:rgba(255,255,255,0.1); border:none; color:rgba(255,255,255,0.7);">Count:</span>
                    <input type="number" id="wizard-session-count" class="form-control" min="1" max="50" value="1">
                    <span class="input-group-btn">
                        <button class="btn btn-primary" id="wizard-generate-btn" type="button" style="background-color:#0071e3; border:none; font-weight:700; height:34px;">Add Multiple</button>
                    </span>
                </div>
                <div style="color: rgba(255,255,255,0.5); font-weight: 600;">— OR —</div>
                <button type="button" id="add-session-prominent-btn" class="btn btn-primary" style="background: linear-gradient(135deg, #005bb5 0%, #0071e3 100%); border:none; border-radius:8px; font-weight:700; height:34px; padding: 0 1.5rem;">
                    <i class="fas fa-plus-circle"></i> Add Single Session
                </button>
            </div>
            <small style="display:block; margin-top:10px; color:rgba(255,255,255,0.4);">(Existing classes are listed below the wizard)</small>
        </div>
    `;

        topContainer.innerHTML = wizardMarkup;

        // Find the form and move things to the top
        const form = addBtn.closest('form');
        if (form) {
            form.prepend(topContainer);
            topContainer.appendChild(inlineContainer);
        }

        document.getElementById('wizard-generate-btn').addEventListener('click', function () {
            const count = parseInt(document.getElementById('wizard-session-count').value, 10) || 1;
            for (let i = 0; i < count; i++) {
                addBtn.click();
            }
            setTimeout(() => {
                const fields = inlineContainer.querySelectorAll('.inline-field');
                if (fields.length) {
                    fields[fields.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 150);
        });

        document.getElementById('add-session-prominent-btn').addEventListener('click', function () {
            addBtn.click();
            setTimeout(() => {
                const fields = inlineContainer.querySelectorAll('.inline-field');
                if (fields.length) {
                    fields[fields.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 150);
        });

        // ── CUSTOMIZE SAVE BUTTONS ──
        const saveBtn = document.querySelector('input[name="_save"]');
        if (saveBtn) {
            saveBtn.value = '🚀 Deploy Teaching Series Updates';
            saveBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
            saveBtn.style.border = 'none';
            saveBtn.style.boxShadow = '0 4px 12px rgba(16,185,129,0.35)';
            saveBtn.style.fontWeight = '700';
            saveBtn.style.padding = '0.65rem 1.5rem';
            saveBtn.style.transition = 'all 0.2s';
            saveBtn.addEventListener('mouseenter', () => saveBtn.style.transform = 'translateY(-2px)');
            saveBtn.addEventListener('mouseleave', () => saveBtn.style.transform = 'translateY(0)');
            saveBtn.addEventListener('mousedown', () => saveBtn.style.transform = 'translateY(1px)');
        }

        const addAnotherBtn = document.querySelector('input[name="_add_another"]');
        if (addAnotherBtn) {
            addAnotherBtn.value = 'Save & Add Another Series';
            addAnotherBtn.style.background = 'rgba(255,255,255,0.05)';
            addAnotherBtn.style.border = '1px solid rgba(255,255,255,0.2)';
            addAnotherBtn.style.color = 'white';
        }

        const continueBtn = document.querySelector('input[name="_continue_editing"]');
        if (continueBtn) {
            continueBtn.value = 'Save & Continue Editing Series';
            continueBtn.style.background = 'rgba(255,255,255,0.05)';
            continueBtn.style.border = '1px solid rgba(255,255,255,0.2)';
            continueBtn.style.color = 'white';
        }

        const cancelBtn = document.querySelector('a.btn-danger');
        if (cancelBtn) {
            cancelBtn.style.background = 'rgba(239, 68, 68, 0.8)';
            cancelBtn.style.border = 'none';
            cancelBtn.style.backdropFilter = 'blur(4px)';
        }
    });
</script>
{% endblock %}
