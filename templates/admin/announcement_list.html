{% extends "admin/model/list.html" %}

{% block list_table %}
<table id="announcementTable" class="admin-list basic-view">
  {{ super() }}
</table>

<script>
  (function() {
    const toggleBtn = document.getElementById('advancedToggle');
    const table = document.getElementById('announcementTable');

    if (!toggleBtn || !table) return;

    // Restore saved preference
    const savedMode = localStorage.getItem('announcementViewMode');
    if (savedMode === 'advanced') {
      table.classList.remove('basic-view');
      toggleBtn.classList.add('active');
      toggleBtn.textContent = 'Show Basic Fields';
    }

    // Toggle handler
    toggleBtn.addEventListener('click', function(e) {
      e.preventDefault();
      table.classList.toggle('basic-view');
      this.classList.toggle('active');

      if (this.classList.contains('active')) {
        this.textContent = 'Show Basic Fields';
        localStorage.setItem('announcementViewMode', 'advanced');
      } else {
        this.textContent = 'Show Advanced Fields';
        localStorage.setItem('announcementViewMode', 'basic');
      }
    });
  })();
</script>
{% endblock %}

{% block list_header %}
<div class="advanced-toggle-section">
  {{ super() }}
  <button class="advanced-toggle-btn" id="advancedToggle">Show Advanced Fields</button>
</div>
{% endblock %}
