{% extends "base.html" %}

{% block title %}Search - CPC New Haven{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
    .search-page {
        min-height: calc(100vh - 200px);
        padding: 0;
        margin: 0;
    }

    .search-container {
        max-width: 100%;
        margin: 0;
        padding: 0 0.75rem;
    }

    .search-hero {
        padding: 0.5rem 0;
        text-align: center;
        margin-bottom: 0.75rem;
    }

    .search-hero h1 {
        font-size: 1.75rem;
        color: rgba(255, 255, 255, 0.95);
        margin: 0 0 0.25rem 0;
        font-weight: 600;
    }

    .search-hero p {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.9rem;
        margin: 0;
    }

    .search-section {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        padding: 0.75rem;
        margin-bottom: 0.75rem;
    }

    .search-section label {
        display: block;
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.85rem;
        margin-bottom: 0.5rem;
        font-weight: 500;
    }

    .search-section input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        color: white;
        font-size: 0.9rem;
    }

    .search-section button {
        padding: 0.5rem 1rem;
        background: rgba(0, 82, 163, 0.4);
        border: 1px solid rgba(0, 82, 163, 0.6);
        border-radius: 6px;
        color: white;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
    }

    .search-section button:hover {
        background: rgba(0, 82, 163, 0.5);
    }

    .filter-tabs {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 0.75rem;
    }

    .filter-tab {
        padding: 0.5rem 1rem;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
    }

    .filter-tab.active,
    .filter-tab:hover {
        background: rgba(255, 255, 255, 0.2);
        color: white;
    }

    .results-container {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    .result-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 0.75rem;
    }

    .result-card h3 {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.95);
        margin: 0 0 0.5rem 0;
        font-weight: 600;
    }

    .result-card p {
        font-size: 0.85rem;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.8);
        margin: 0;
    }
</style>
{% endblock %}

{% block content %}
<div class="search-page compact-page">
    <div class="search-container compact-content">
        <div class="search-hero compact-hero">
            <h1>Search</h1>
            <p>Find sermons, podcasts, announcements, and more</p>
        </div>

        <!-- Search Bar -->
        <div class="search-section">
            <label>Search</label>
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="searchInput"
                    placeholder="Search for anything... (e.g., 'Luke', 'grace', 'worship')" autocomplete="off">
                <button id="searchButton">Go</button>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-type="all">All Content</button>
            <button class="filter-tab" data-type="sermons">Sermons</button>
            <button class="filter-tab" data-type="podcasts">Podcasts</button>
            <button class="filter-tab" data-type="announcements">Announcements</button>
            <button class="filter-tab" data-type="events">Events</button>
            <button class="filter-tab" data-type="gallery">Gallery</button>
            <button class="filter-tab" data-type="papers">Papers</button>
            <button class="filter-tab" data-type="teaching_series">Teaching Series</button>
        </div>

        <!-- Search Results -->
        <div class="results-container" id="searchResults">
            <!-- Results will be populated here -->
        </div>
    </div>
</div>

<script>
    let currentType = 'all';
    let currentPage = 1;
    let currentQuery = '';

    const searchInput = document.getElementById('searchInput');
    const searchButton = document.getElementById('searchButton');
    const searchResults = document.getElementById('searchResults');
    const filterTabs = document.querySelectorAll('.filter-tab');

    searchButton.addEventListener('click', performSearch);

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            performSearch();
        }
    });

    filterTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            filterTabs.forEach(t => {
                t.classList.remove('active', 'bg-blue-600', 'text-white');
                t.classList.add('bg-gray-200', 'text-gray-700');
            });
            tab.classList.add('active', 'bg-blue-600', 'text-white');
            tab.classList.remove('bg-gray-200', 'text-gray-700');
            currentType = tab.dataset.type;
            currentPage = 1;
            if (currentQuery) {
                performSearch();
            }
        });
    });

    function performSearch() {
        const query = searchInput.value.trim();
        if (!query) {
            showEmptyState();
            return;
        }

        currentQuery = query;
        showLoading();

        fetch(`/api/search?q=${encodeURIComponent(query)}&type=${currentType}&page=${currentPage}&per_page=10`)
            .then(response => response.json())
            .then(data => {
                displayResults(data);
            })
            .catch(error => {
                console.error('Search error:', error);
                showError();
            });
    }

    function showLoading() {
        searchResults.innerHTML = '<div class="p-10 bg-white/5 border border-white/10 rounded-lg text-center text-gray-400">Searching...</div>';
    }

    function showEmptyState() {
        searchResults.innerHTML = `
            <div class="p-10 bg-white/5 border border-white/10 rounded-lg text-center text-gray-400">
                <h2 class="text-2xl font-semibold mb-2 text-white">Start Your Search</h2>
                <p class="text-base">Enter a search query to find content across the site</p>
            </div>
        `;
    }

    function showError() {
        searchResults.innerHTML = `
            <div class="p-10 bg-red-500/10 border border-red-500/20 rounded-lg text-center text-red-200">
                <h2 class="text-2xl font-semibold mb-2">Search Error</h2>
                <p class="text-base">Something went wrong. Please try again.</p>
            </div>
        `;
    }

    function displayResults(data) {
        if (data.total === 0) {
            searchResults.innerHTML = `
                <div class="p-10 bg-gray-50/5 border border-white/10 rounded-lg text-center text-gray-400">
                    <h2 class="text-2xl font-semibold mb-2 text-white">No Results Found</h2>
                    <p class="text-base">Try a different search term or check the spelling</p>
                </div>
            `;
            return;
        }

        const typeLabels = {
            'sermon': 'Sermon',
            'announcement': 'Announcement',
            'podcast': 'Podcast',
            'event': 'Event',
            'gallery': 'Gallery',
            'paper': 'Paper',
            'teaching_series': 'Teaching Series',
            'sermon_series': 'Sermon Series'
        };

        let html = `
            <div class="mb-6">
                <div class="text-base text-gray-400">Found ${data.total} result${data.total !== 1 ? 's' : ''}</div>
            </div>
            <div class="space-y-6">
        `;

        data.results.forEach(item => {
            const label = typeLabels[item.type] || item.type;
            const dateStr = item.date ? new Date(item.date).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }) : '';

            html += `
                <div class="result-card p-6 border border-white/10 rounded-lg shadow-sm hover:shadow-md transition bg-white/5 backdrop-blur-md">
                    <div class="px-3 py-1 bg-blue-500/20 text-blue-300 rounded-full text-xs font-semibold inline-block mb-3 uppercase tracking-wider">${label}</div>
                    <h3 class="text-xl font-bold mb-2 text-white">${item.title}</h3>
                    <div class="text-sm text-gray-400 mb-4 flex flex-wrap gap-2 items-center">
                        ${item.speaker || item.author ? `<span>${item.speaker || item.author}</span><span class="opacity-30">•</span>` : ''}
                        ${dateStr ? `<span>${dateStr}</span>` : ''}
                        ${item.category ? `<span class="opacity-30">•</span><span>${item.category}</span>` : ''}
                        ${item.series ? `<span class="opacity-30">•</span><span class="text-blue-400">${item.series}</span>` : ''}
                    </div>
                    ${item.description ? `<p class="text-base leading-relaxed text-gray-300 mb-4">${item.description}</p>` : ''}
                    ${item.url ? `<a href="${item.url}" class="inline-flex items-center text-blue-400 font-medium hover:text-blue-300 transition-colors" ${item.url.startsWith('http') ? 'target="_blank"' : ''}>
                        View Details <i class="fas fa-arrow-right ml-2 text-xs"></i>
                    </a>` : ''}
                </div>
            `;
        });

        html += '</div>';

        if (data.pages > 1) {
            html += `<div class="flex justify-center items-center gap-4 mt-8">`;
            html += `<button class="px-4 py-2 border rounded-lg ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-50'}" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">← Previous</button>`;
            html += `<span class="text-gray-700">Page ${data.page} of ${data.pages}</span>`;
            html += `<button class="px-4 py-2 border rounded-lg ${currentPage >= data.pages ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-50'}" ${currentPage >= data.pages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">Next →</button>`;
            html += `</div>`;
        }

        searchResults.innerHTML = html;
    }

    function changePage(page) {
        currentPage = page;
        performSearch();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.changePage = changePage;
    // Auto-run if ?q= is present
    const params = new URLSearchParams(window.location.search);
    const initialQ = params.get('q');
    if (initialQ) {
        searchInput.value = initialQ;
        performSearch();
    } else {
        showEmptyState();
    }
</script>
{% endblock %}
