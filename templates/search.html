{% extends "base.html" %}

{% block title %}Search - CPC New Haven{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
    .search-page {
        min-height: calc(100vh - 200px);
        padding: 0;
        margin: 0;
    }

    .search-container {
        max-width: 100%;
        margin: 0;
        padding: 0 0.75rem;
    }

    .search-hero {
        padding: 0.5rem 0;
        text-align: center;
        margin-bottom: 0.75rem;
    }

    .search-hero h1 {
        font-size: 1.75rem;
        color: rgba(255, 255, 255, 0.95);
        margin: 0 0 0.25rem 0;
        font-weight: 600;
    }

    .search-hero p {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.9rem;
        margin: 0;
    }

    .search-section {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        padding: 0.75rem;
        margin-bottom: 0.75rem;
    }

    .search-section label {
        display: block;
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.85rem;
        margin-bottom: 0.5rem;
        font-weight: 500;
    }

    .search-section input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        color: white;
        font-size: 0.9rem;
    }

    .search-section button {
        padding: 0.5rem 1rem;
        background: rgba(0, 82, 163, 0.4);
        border: 1px solid rgba(0, 82, 163, 0.6);
        border-radius: 6px;
        color: white;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
    }

    .search-section button:hover {
        background: rgba(0, 82, 163, 0.5);
    }

    .filter-tabs {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 0.75rem;
    }

    .filter-tab {
        padding: 0.5rem 1rem;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
    }

    .filter-tab.active,
    .filter-tab:hover {
        background: rgba(255, 255, 255, 0.2);
        color: white;
    }

    .results-container {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    .result-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 0.75rem;
    }

    .result-card h3 {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.95);
        margin: 0 0 0.5rem 0;
        font-weight: 600;
    }

    .result-card p {
        font-size: 0.85rem;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.8);
        margin: 0;
    }
</style>
{% endblock %}

{% block content %}
<div class="search-page compact-page">
    <div class="search-container compact-content">
        <div class="search-hero compact-hero">
            <h1>Search</h1>
            <p>Find sermons, podcasts, announcements, and more</p>
            <p style="margin-top: 0.5rem; font-size: 0.85rem;">
                <a href="/archive" style="color: rgba(135, 206, 250, 0.9); text-decoration: none; font-weight: 500; transition: color 0.2s;">
                    Browse our archive →
                </a>
            </p>
        </div>

        <!-- Search Bar -->
        <div class="search-section">
            <label>Search</label>
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="searchInput"
                    placeholder="Search for anything... (e.g., 'Luke', 'grace', 'worship')" autocomplete="off">
                <button id="searchButton">Go</button>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-type="all">All Content</button>
            <button class="filter-tab" data-type="sermons">Sermons</button>
            <button class="filter-tab" data-type="podcasts">Podcasts</button>
            <button class="filter-tab" data-type="announcements">Announcements</button>
            <button class="filter-tab" data-type="events">Events</button>
            <button class="filter-tab" data-type="gallery">Gallery</button>
            <button class="filter-tab" data-type="papers">Papers</button>
            <button class="filter-tab" data-type="teaching_series">Teaching Series</button>
            <button class="filter-tab" data-type="sermon_series">Sermon Series</button>
        </div>

        <!-- Search Results -->
        <div class="results-container" id="searchResults">
            <!-- Results will be populated here -->
        </div>
    </div>
</div>

<script>
    let currentType = 'all';
    let currentPage = 1;
    let currentQuery = '';

    const searchInput = document.getElementById('searchInput');
    const searchButton = document.getElementById('searchButton');
    const searchResults = document.getElementById('searchResults');
    const filterTabs = document.querySelectorAll('.filter-tab');

    searchButton.addEventListener('click', performSearch);

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            performSearch();
        }
    });

    filterTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            filterTabs.forEach(t => {
                t.classList.remove('active', 'bg-blue-600', 'text-white');
                t.classList.add('bg-gray-200', 'text-gray-700');
            });
            tab.classList.add('active', 'bg-blue-600', 'text-white');
            tab.classList.remove('bg-gray-200', 'text-gray-700');
            currentType = tab.dataset.type;
            currentPage = 1;
            if (currentQuery) {
                performSearch();
            }
        });
    });

    function performSearch() {
        const query = searchInput.value.trim();
        if (!query) {
            showEmptyState();
            return;
        }

        currentQuery = query;
        showLoading();

        fetch(`/api/search?q=${encodeURIComponent(query)}&type=${currentType}&page=${currentPage}&per_page=10`)
            .then(response => response.json())
            .then(data => {
                displayResults(data);
            })
            .catch(error => {
                console.error('Search error:', error);
                showError();
            });
    }

    function showLoading() {
        searchResults.innerHTML = '<div style="padding: 2.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; text-align: center; color: rgba(255,255,255,0.6);">Searching...</div>';
    }

    function showEmptyState() {
        searchResults.innerHTML = `
            <div style="padding: 2.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; text-align: center; color: rgba(255,255,255,0.6);">
                <h2 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; color: rgba(255,255,255,0.95);">Start Your Search</h2>
                <p style="font-size: 1rem; margin-bottom: 1.5rem;">Enter a search query to find content across the site</p>
                <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem;">
                    <span style="font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.05em; width: 100%; margin-bottom: 0.5rem;">Popular Searches</span>
                    <button onclick="quickSearch('Total')" style="padding: 0.25rem 0.75rem; background: rgba(255,255,255,0.1); border: none; border-radius: 9999px; color: rgba(255,255,255,0.8); font-size: 0.75rem; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">Total Christ</button>
                    <button onclick="quickSearch('Luke')" style="padding: 0.25rem 0.75rem; background: rgba(255,255,255,0.1); border: none; border-radius: 9999px; color: rgba(255,255,255,0.8); font-size: 0.75rem; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">Luke</button>
                    <button onclick="quickSearch('Community')" style="padding: 0.25rem 0.75rem; background: rgba(255,255,255,0.1); border: none; border-radius: 9999px; color: rgba(255,255,255,0.8); font-size: 0.75rem; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">Community</button>
                    <button onclick="quickSearch('Service')" style="padding: 0.25rem 0.75rem; background: rgba(255,255,255,0.1); border: none; border-radius: 9999px; color: rgba(255,255,255,0.8); font-size: 0.75rem; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">Service</button>
                </div>
            </div>
        `;
    }

    window.quickSearch = function (term) {
        searchInput.value = term;
        performSearch();
    };

    function highlightText(text, query) {
        if (!query) return text;
        const words = query.split(' ').filter(word => word.length > 2);
        if (words.length === 0) return text;

        let highlighted = text;
        words.forEach(word => {
            const regex = new RegExp(`(${word})`, 'gi');
            highlighted = highlighted.replace(regex, '<mark class="bg-blue-500/30 text-white rounded px-0.5">$1</mark>');
        });
        return highlighted;
    }

    function showError() {
        searchResults.innerHTML = `
            <div style="padding: 2.5rem; background: rgba(220,53,69,0.1); border: 1px solid rgba(220,53,69,0.2); border-radius: 8px; text-align: center; color: rgba(255,100,100,0.9);">
                <h2 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem;">Search Error</h2>
                <p style="font-size: 1rem;">Something went wrong. Please try again.</p>
            </div>
        `;
    }

    function displayResults(data) {
        if (data.total === 0) {
            searchResults.innerHTML = `
                <div style="padding: 2.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; text-align: center; color: rgba(255,255,255,0.6);">
                    <h2 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: rgba(255,255,255,0.95);">No Results Found</h2>
                    <p style="font-size: 1rem;">Try a different search term or check the spelling</p>
                </div>
            `;
            return;
        }

        const typeLabels = {
            'sermon': 'Sermon',
            'announcement': 'Announcement',
            'podcast': 'Podcast',
            'event': 'Event',
            'gallery': 'Gallery',
            'paper': 'Paper',
            'teaching_series': 'Teaching Series',
            'sermon_series': 'Sermon Series'
        };

        let html = `
            <div style="margin-bottom: 1.5rem;">
                <div style="font-size: 1rem; color: rgba(255,255,255,0.6);">Found ${data.total} result${data.total !== 1 ? 's' : ''}</div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        `;

        data.results.forEach(item => {
            const label = typeLabels[item.type] || item.type;
            const dateStr = item.date ? new Date(item.date).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }) : '';

            const highlightedTitle = highlightText(item.title, data.query);
            const highlightedDescription = highlightText(item.description || '', data.query);

            html += `
                <div class="result-card" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 1.5rem;">
                    <div style="padding: 0.25rem 0.75rem; background: rgba(0,102,204,0.2); color: rgba(135,206,250,0.9); border-radius: 9999px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">${label}</div>
                    <h3 style="font-size: 1.125rem; font-weight: bold; margin-bottom: 0.5rem; color: rgba(255,255,255,0.95);">${highlightedTitle}</h3>
                    <div style="font-size: 0.875rem; color: rgba(255,255,255,0.6); margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center;">
                        ${item.speaker || item.author ? `<span>${item.speaker || item.author}</span><span style="opacity: 0.3;">•</span>` : ''}
                        ${dateStr ? `<span>${dateStr}</span>` : ''}
                        ${item.category ? `<span style="opacity: 0.3;">•</span><span>${item.category}</span>` : ''}
                        ${item.series ? `<span style="opacity: 0.3;">•</span><span style="color: rgba(135,206,250,0.9);">${item.series}</span>` : ''}
                    </div>
                    ${item.description ? `<p style="font-size: 1rem; line-height: 1.6; color: rgba(255,255,255,0.8); margin-bottom: 1rem;">${highlightedDescription}</p>` : ''}
                    ${item.url ? `<a href="${item.url}" style="display: inline-flex; align-items: center; color: rgba(135,206,250,0.9); font-weight: 500; text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='rgba(135,206,250,1)'" onmouseout="this.style.color='rgba(135,206,250,0.9)'" ${item.url.startsWith('http') ? 'target="_blank"' : ''}>
                        View Details <i class="fas fa-arrow-right" style="margin-left: 0.5rem; font-size: 0.75rem;"></i>
                    </a>` : ''}
                </div>
            `;
        });

        html += '</div>';

        if (data.pages > 1) {
            const prevStyle = `padding: 0.5rem 1rem; background: rgba(0,82,163,0.3); border: 1px solid rgba(0,82,163,0.5); border-radius: 6px; color: white; cursor: ${currentPage === 1 ? 'not-allowed' : 'pointer'}; opacity: ${currentPage === 1 ? '0.5' : '1'}; transition: background 0.2s;`;
            const nextStyle = `padding: 0.5rem 1rem; background: rgba(0,82,163,0.3); border: 1px solid rgba(0,82,163,0.5); border-radius: 6px; color: white; cursor: ${currentPage >= data.pages ? 'not-allowed' : 'pointer'}; opacity: ${currentPage >= data.pages ? '0.5' : '1'}; transition: background 0.2s;`;
            html += `<div style="display: flex; justify-content: center; align-items: center; gap: 1rem; margin-top: 2rem;">`;
            html += `<button style="${prevStyle}" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})" onmouseover="if(${currentPage !== 1}) this.style.background='rgba(0,82,163,0.4)'" onmouseout="this.style.background='rgba(0,82,163,0.3)'">← Previous</button>`;
            html += `<span style="color: rgba(255,255,255,0.7);">Page ${data.page} of ${data.pages}</span>`;
            html += `<button style="${nextStyle}" ${currentPage >= data.pages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})" onmouseover="if(${currentPage < data.pages}) this.style.background='rgba(0,82,163,0.4)'" onmouseout="this.style.background='rgba(0,82,163,0.3)'">Next →</button>`;
            html += `</div>`;
        }

        searchResults.innerHTML = html;
    }

    function changePage(page) {
        currentPage = page;
        performSearch();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.changePage = changePage;
    // Auto-run if ?q= is present
    const params = new URLSearchParams(window.location.search);
    const initialQ = params.get('q');
    if (initialQ) {
        searchInput.value = initialQ;
        performSearch();
    } else {
        showEmptyState();
    }
</script>
{% endblock %}
